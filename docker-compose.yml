services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rubcube
      POSTGRES_PASSWORD: rubcube
      POSTGRES_DB: rubcube
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rubcube']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://rubcube:rubcube@db:5432/rubcube?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 1h
      BCRYPT_SALT_ROUNDS: 10
      COUNTRIES_API_URL: https://restcountries.com/v5
      COUNTRIES_API_KEY: ${COUNTRIES_API_KEY:-}
      COUNTRIES_CACHE_TTL_MS: 600000
    ports:
      - '3000:3000'

volumes:
  db_data:
